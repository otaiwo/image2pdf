version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image2pdf-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stderr
    networks:
      - image2pdf-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image2pdf-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - app
    networks:
      - image2pdf-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image2pdf-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - app
    networks:
      - image2pdf-network

networks:
  image2pdf-network:
    driver: bridge